name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Pinning Node 20 — Node 22.22.2 in the GitHub-hosted toolcache ships
          # with a broken npm that can't `npm install -g npm@*` (missing
          # transitive `promise-retry`). Revisit when Node 22's bundled npm fixes
          # this OR when v5 of these actions ship Node 24 by default.
          node-version: '20'
          # No registry-url here — setup-node's auto-generated .npmrc would
          # inject NODE_AUTH_TOKEN and break OIDC trusted publishing.

      # Upgrade npm to a version that supports Trusted Publishing (>=11.5.1).
      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      # OIDC Trusted Publishing — no token needed.
      # https://docs.npmjs.com/trusted-publishers
      - run: npm publish --access public --provenance
