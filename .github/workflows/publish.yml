name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      # No token — npm Trusted Publishing via OIDC (configured on npmjs.com).
      # See: https://docs.npmjs.com/trusted-publishers
      - run: npm publish --access public --provenance
